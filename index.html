<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuli 的个人主页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>

    <div id="particles-js"></div>

    <div class="card">
        <button id="theme-toggle" title="切换模式">
            <i class="fas fa-moon"></i>
        </button>

        <img src="images/fuli1.jpg" alt="我的头像" class="profile-img">

        <h1>你好，我是 Fuli</h1>
        <p>👋 终身学习者 / 毛坯房正在装修中 </p>

        <div class="social-links">
            <a href="https://github.com/fuli-phy" class="btn" target="_blank">
                <i class="fab fa-github"></i> 关注我的 GitHub
            </a>
        </div>

        <div class="counter">
            <p>第 <span id="busuanzi_value_site_uv">--</span> 位极客</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        /* 1. 初始化粒子背景 */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" }
                }
            }
        });

        /* 2. 暗黑模式切换脚本 */
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
    </script>
</body>
</html>
